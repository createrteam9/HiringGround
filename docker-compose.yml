version: '3.8'

services:
  # Next.js Frontend
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - hiringground_net

  # Spring Boot Backend (Modular Monolith)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/hiringground
      - DB_USERNAME=hg_admin
      - DB_PASSWORD=hg_secure_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db
      - redis
    networks:
      - hiringground_net

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=hiringground
      - POSTGRES_USER=hg_admin
      - POSTGRES_PASSWORD=hg_secure_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - hiringground_net

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - hiringground_net

networks:
  hiringground_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
